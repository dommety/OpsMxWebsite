<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo/opsmx-logo.svg" />

    <!-- Primary meta -->
    <title>OpsMx Active Defense — Active Defense & Remediation Platform</title>
    <meta name="description" content="Continuously detect, diagnose, prioritize, remediate, verify, and govern risks across software, AI, supply chains, cloud, runtime, and operations." />

    <!-- Canonical: production homepage URL (stays www.opsmx.com even on staging) -->
    <link rel="canonical" href="https://www.opsmx.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Open Graph -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OpsMx Active Defense — Active Defense & Remediation Platform" />
    <meta property="og:description" content="Continuously detect, diagnose, prioritize, remediate, verify, and govern risks across software, AI, supply chains, cloud, runtime, and operations." />
    <meta property="og:url" content="https://www.opsmx.com/" />
    <meta property="og:site_name" content="OpsMx" />
    <meta property="og:image" content="https://www.opsmx.com/wp-content/uploads/2023/03/OpsMx-New-Logo-192x51-1-e1679371722732.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ops_mx" />

    <!-- Structured data: Organization + WebSite + WebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.opsmx.com/#organization",
          "name": "OpsMx",
          "url": "https://www.opsmx.com/",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://www.opsmx.com/#/schema/logo/image/",
            "url": "https://www.opsmx.com/wp-content/uploads/2023/03/OpsMx-New-Logo-192x51-1-e1679371722732.png",
            "contentUrl": "https://www.opsmx.com/wp-content/uploads/2023/03/OpsMx-New-Logo-192x51-1-e1679371722732.png",
            "width": 192,
            "height": 57,
            "caption": "OpsMx"
          },
          "image": { "@id": "https://www.opsmx.com/#/schema/logo/image/" },
          "sameAs": [
            "https://www.linkedin.com/company/opsmx",
            "https://twitter.com/ops_mx",
            "https://www.youtube.com/c/OpsMx"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.opsmx.com/#website",
          "url": "https://www.opsmx.com/",
          "name": "OpsMx",
          "description": "OpsMx Active Defense & Remediation Platform",
          "publisher": { "@id": "https://www.opsmx.com/#organization" },
          "inLanguage": "en-US"
        },
        {
          "@type": "WebPage",
          "@id": "https://www.opsmx.com/#webpage",
          "url": "https://www.opsmx.com/",
          "name": "OpsMx Active Defense — Active Defense & Remediation Platform",
          "isPartOf": { "@id": "https://www.opsmx.com/#website" },
          "about": { "@id": "https://www.opsmx.com/#organization" },
          "description": "Continuously detect, diagnose, prioritize, remediate, verify, and govern risks across software, AI, supply chains, cloud, runtime, and operations.",
          "inLanguage": "en-US"
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
